name = "kirari"
version = "1.1.1"
description = "A unified package manager for Gleam — Hex + npm in one workflow"
licences = ["MPL-2.0"]

[dependencies]
argv = ">= 1.0.2 and < 2.0.0"
filepath = ">= 1.1.2 and < 2.0.0"
gleam_community_ansi = ">= 1.4.4 and < 2.0.0"
gleam_crypto = ">= 1.5.1 and < 2.0.0"
gleam_erlang = ">= 1.3.0 and < 2.0.0"
gleam_http = ">= 4.3.0 and < 5.0.0"
gleam_httpc = ">= 5.0.0 and < 6.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
gleam_otp = ">= 1.2.0 and < 2.0.0"
gleam_regexp = ">= 1.1.1 and < 2.0.0"
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
gleam_time = ">= 1.8.0 and < 2.0.0"
glint = ">= 1.2.1 and < 2.0.0"
simplifile = ">= 2.4.0 and < 3.0.0"
tom = ">= 2.0.2 and < 3.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
