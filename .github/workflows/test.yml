name: test

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.15.2"
          rebar3-version: "3"

      # Bootstrap: gleam으로 kir 빌드 및 설치
      - name: Bootstrap and install kir
        run: |
          gleam build && gleam export erlang-shipment
          cp scripts/kir build/erlang-shipment/kir
          chmod +x build/erlang-shipment/kir
          sudo cp -r build/erlang-shipment /usr/local/lib/erlang-shipment
          sudo ln -sf /usr/local/lib/erlang-shipment/kir /usr/local/bin/kir

      # kir로 검증
      - run: kir install --frozen
      - run: kir check
      - run: kir test
      - run: kir format --check src test
