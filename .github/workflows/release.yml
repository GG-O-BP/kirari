name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            archive: tar.gz
          - os: windows-2022
            name: windows-x86_64
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.15.2"
          rebar3-version: "3"

      # 1. Bootstrap: gleam으로 kir 빌드
      - name: Bootstrap kir
        run: gleam build && gleam export erlang-shipment

      # 2. kir 설치 (Linux)
      - name: Install kir (Linux)
        if: runner.os == 'Linux'
        run: |
          cp scripts/kir build/erlang-shipment/kir
          chmod +x build/erlang-shipment/kir
          sudo cp -r build/erlang-shipment /usr/local/lib/erlang-shipment
          sudo ln -sf /usr/local/lib/erlang-shipment/kir /usr/local/bin/kir
          kir --help | head -2

      # 2. kir 설치 (Windows)
      - name: Install kir (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item scripts\kir.bat build\erlang-shipment\kir.bat
          Copy-Item scripts\kir build\erlang-shipment\kir
          Copy-Item -Recurse build\erlang-shipment C:\kirari
          $env:Path = "C:\kirari;" + $env:Path
          [Environment]::SetEnvironmentVariable("Path", $env:Path, "Process")
          kir.bat --help | Select-Object -First 2

      # 3. kir로 검증
      - name: Verify with kir (Linux)
        if: runner.os == 'Linux'
        run: |
          kir install --frozen
          kir check
          kir test

      - name: Verify with kir (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          set PATH=C:\kirari;%PATH%
          kir.bat install --frozen
          kir.bat check
          kir.bat test

      # 4. kir로 최종 릴리스 빌드
      - name: Release build (Linux)
        if: runner.os == 'Linux'
        run: |
          kir clean
          kir install
          kir export erlang-shipment
          cp scripts/kir build/erlang-shipment/kir
          chmod +x build/erlang-shipment/kir

      - name: Release build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          set PATH=C:\kirari;%PATH%
          kir.bat clean
          kir.bat install
          kir.bat export erlang-shipment
          copy scripts\kir.bat build\erlang-shipment\kir.bat
          copy scripts\kir build\erlang-shipment\kir

      # 5. 아카이브
      - name: Archive (Linux)
        if: runner.os == 'Linux'
        run: tar -czf kirari-${{ matrix.name }}.tar.gz -C build erlang-shipment

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path build/erlang-shipment -DestinationPath kirari-${{ matrix.name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kirari-${{ matrix.name }}
          path: kirari-${{ matrix.name }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/kirari-linux-x86_64.tar.gz
            artifacts/kirari-windows-x86_64.zip
